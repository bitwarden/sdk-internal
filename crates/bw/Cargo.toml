[package]
name = "bw"
version = "0.0.2"
description = """
Bitwarden Password Manager CLI
"""
keywords = ["bitwarden", "password-manager", "cli"]

authors.workspace = true
edition.workspace = true
rust-version.workspace = true
readme.workspace = true
homepage.workspace = true
repository.workspace = true
license-file.workspace = true

[dependencies]
base64 = ">=0.22.1, <0.23"
bat = { version = "0.26.0", features = [
    "regex-fancy",
], default-features = false }
bitwarden-api-api = { workspace = true }
bitwarden-cli = { workspace = true }
bitwarden-collections = { workspace = true }
bitwarden-core = { workspace = true }
bitwarden-generators = { workspace = true }
bitwarden-pm = { workspace = true }
bitwarden-sync = { workspace = true }
bitwarden-vault = { workspace = true }
bw-macro = { workspace = true }
clap = { version = "4.5.4", features = ["derive", "env"] }
color-eyre = "0.6.3"
erased-serde = "0.4.6"
inquire = "0.9.1"
inventory = "0.3.15"
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = "0.9.33"
thiserror = { workspace = true }
tokio = { workspace = true, features = ["rt-multi-thread"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

[dev-dependencies]
bitwarden-crypto = { workspace = true }
bitwarden-test = { workspace = true }
uuid = { workspace = true }
wiremock = { workspace = true }

[lints]
workspace = true
