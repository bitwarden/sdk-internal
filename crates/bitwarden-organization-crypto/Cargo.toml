[package]
name = "bitwarden-organization-crypto"
description = """
Internal crate for the bitwarden crate. Do not use.
"""

version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
homepage.workspace = true
repository.workspace = true
license = "GPL-3.0-only OR LicenseRef-Bitwarden-SDK"
readme.workspace = true
keywords.workspace = true

[features]
default = []
wasm = [
    "dep:tsify",
    "dep:wasm-bindgen",
    "bitwarden-crypto/wasm",
    "bitwarden-encoding/wasm",
    "bitwarden-random/wasm",
] # WASM support

[dependencies]
bitwarden-crypto = { workspace = true }
bitwarden-encoding = { workspace = true }
bitwarden-random = { workspace = true }
bitwarden-sensitive-value = { workspace = true }
ciborium = { workspace = true }
rand = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
subtle = { workspace = true }
thiserror = { workspace = true }
tsify = { workspace = true, optional = true }
wasm-bindgen = { workspace = true, optional = true }
zeroize = { workspace = true }

[dev-dependencies]
bitwarden-crypto = { workspace = true, features = ["test-utils"] }
uuid = { workspace = true }

[lints]
workspace = true
