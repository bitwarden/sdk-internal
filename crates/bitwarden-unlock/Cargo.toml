[package]
name = "bitwarden-unlock"
description = """
User unlock / crypto initialization for the Bitwarden SDK.
"""

version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
readme.workspace = true
homepage.workspace = true
repository.workspace = true
license-file.workspace = true
keywords.workspace = true

[features]
internal = ["bitwarden-core/internal"]
uniffi = [
    "internal",
    "bitwarden-core/uniffi",
    "bitwarden-crypto/uniffi",
    "dep:uniffi",
]
wasm = [
    "bitwarden-core/wasm",
    "bitwarden-crypto/wasm",
]

[dependencies]
bitwarden-core = { workspace = true }
bitwarden-crypto = { workspace = true }
uniffi = { workspace = true, optional = true, features = ["tokio"] }

[lints]
workspace = true
