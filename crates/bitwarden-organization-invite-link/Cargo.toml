[package]
name = "bitwarden-organization-invite-link"
description = """
Internal crate for the bitwarden crate. Do not use.
"""

version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
readme.workspace = true
homepage.workspace = true
repository.workspace = true
license = "GPL-3.0-only OR LicenseRef-Bitwarden-SDK"
keywords.workspace = true

[features]
default = []
wasm = [
    "bitwarden-core/wasm",
    "bitwarden-crypto/wasm",
    "bitwarden-encoding/wasm",
    "bitwarden-error/wasm",
    "bitwarden-organization-crypto/wasm",
    "dep:wasm-bindgen",
    "dep:wasm-bindgen-futures",
]

[dependencies]
bitwarden-api-api = { workspace = true }
bitwarden-core = { workspace = true, features = ["internal"] }
bitwarden-crypto = { workspace = true }
bitwarden-encoding = { workspace = true }
bitwarden-error = { workspace = true }
bitwarden-organization-crypto = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }
wasm-bindgen = { workspace = true, optional = true }
wasm-bindgen-futures = { workspace = true, optional = true }

[dev-dependencies]
bitwarden-api-api = { workspace = true, features = ["mockall"] }
bitwarden-core = { workspace = true, features = ["internal", "test-fixtures"] }
tokio = { workspace = true, features = ["macros", "rt"] }

[lints]
workspace = true
