---
name: Build bw

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build bw - ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x64
            runner: ubuntu-24.04
            binary: bw
            target: x86_64-unknown-linux-gnu
          - name: linux-arm64
            runner: ubuntu-22.04-arm
            binary: bw
            target: aarch64-unknown-linux-gnu
          - name: macos-x64
            runner: macos-13
            binary: bw
            target: x86_64-apple-darwin
          - name: macos-arm64
            runner: macos-14
            binary: bw
            target: aarch64-apple-darwin
          - name: windows-x64
            runner: windows-2022
            binary: bw.exe
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: ${{ matrix.target }}-cargo

      - name: Build
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo build -p bw --release

      - name: Version check (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          CARGO_VERSION=$(grep '^version' crates/bw/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          BINARY_VERSION=$(./target/release/bw --version | awk '{print $NF}')
          echo "Cargo.toml version: $CARGO_VERSION"
          echo "Binary version: $BINARY_VERSION"
          if [ "$CARGO_VERSION" != "$BINARY_VERSION" ]; then
            echo "Version mismatch: Cargo.toml=$CARGO_VERSION, binary=$BINARY_VERSION"
            exit 1
          fi

      - name: Version check (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $CargoVersion = (Select-String -Path 'crates/bw/Cargo.toml' -Pattern '^version\s*=\s*"(.+)"' | Select-Object -First 1).Matches.Groups[1].Value
          $BinaryVersion = (.\target\release\bw.exe --version).Split()[-1]
          Write-Host "Cargo.toml version: $CargoVersion"
          Write-Host "Binary version: $BinaryVersion"
          if ($CargoVersion -ne $BinaryVersion) {
            Write-Error "Version mismatch: Cargo.toml=$CargoVersion, binary=$BinaryVersion"
            exit 1
          }

      - name: Zip binary (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: zip bw-${{ matrix.name }}.zip ./target/release/${{ matrix.binary }}

      - name: Zip binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path .\target\release\${{ matrix.binary }} -DestinationPath bw-${{ matrix.name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ matrix.name }}
          path: bw-${{ matrix.name }}.zip
          retention-days: 30
